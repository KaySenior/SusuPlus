dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/final.jpg
    - assets/images/atom.png
    - assets/images/g_logo.png
    - assets/images/arrow-left.svg
    - assets/images/x.svg
    - assets/404.json
    - assets/loading.json
