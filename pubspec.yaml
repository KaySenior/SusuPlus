name: susu
description: A new Flutter project

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter_native_splash: ^2.4.0
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10 

  cupertino_icons: ^1.0.8
  lottie: ^3.1.2
  go_router: ^17.2.3
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  sign_in_with_apple: ^8.1.0
  google_sign_in: ^6.2.1
